<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AudioVibe - Sign Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center p-4">
    <div class="glass-effect rounded-2xl p-8 w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-white mb-2">AudioVibe</h1>
            <p class="text-gray-200">Create your account</p>
        </div>
        
        <form id="signupForm" class="space-y-6">
            <div>
                <label class="block text-white text-sm font-medium mb-2">Full Name</label>
                <input type="text" id="fullName" required 
                       class="w-full px-4 py-3 rounded-lg bg-white/20 border border-white/30 text-white placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-purple-400"
                       placeholder="Enter your full name">
            </div>
            
            <div>
                <label class="block text-white text-sm font-medium mb-2">Email</label>
                <input type="email" id="email" required 
                       class="w-full px-4 py-3 rounded-lg bg-white/20 border border-white/30 text-white placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-purple-400"
                       placeholder="Enter your email">
            </div>
            
            <div>
                <label class="block text-white text-sm font-medium mb-2">Password</label>
                <div class="relative">
                    <input type="password" id="password" required
                           class="w-full px-4 py-3 rounded-lg bg-white/20 border border-white/30 text-white placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-purple-400"
                           placeholder="Create a password">
                    <button type="button" onclick="togglePassword('password')" class="absolute right-3 top-3 text-gray-300 hover:text-white">
                        <i class="fas fa-eye" id="eyeIcon1"></i>
                    </button>
                </div>
            </div>
            
            <div>
                <label class="block text-white text-sm font-medium mb-2">Confirm Password</label>
                <div class="relative">
                    <input type="password" id="confirmPassword" required
                           class="w-full px-4 py-3 rounded-lg bg-white/20 border border-white/30 text-white placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-purple-400"
                           placeholder="Confirm your password">
                    <button type="button" onclick="togglePassword('confirmPassword')" class="absolute right-3 top-3 text-gray-300 hover:text-white">
                        <i class="fas fa-eye" id="eyeIcon2"></i>
                    </button>
                </div>
            </div>
            
            <div class="flex items-center">
                <input type="checkbox" id="terms" required class="mr-2 rounded">
                <label for="terms" class="text-white text-sm">
                    I agree to the <a href="#" class="text-purple-300 hover:text-purple-200">Terms of Service</a> and 
                    <a href="#" class="text-purple-300 hover:text-purple-200">Privacy Policy</a>
                </label>
            </div>
            
            <button type="submit" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-semibold py-3 rounded-lg transition duration-300">
                Sign Up
            </button>
        </form>
        
        <div class="mt-6 text-center">
            <p class="text-gray-200">Already have an account? 
                <a href="index.html" class="text-purple-300 hover:text-purple-200 font-semibold">Sign in</a>
            </p>
        </div>
    </div>

    <script>
        function togglePassword(inputId) {
            const passwordInput = document.getElementById(inputId);
            const eyeIcon = inputId === 'password' ? document.getElementById('eyeIcon1') : document.getElementById('eyeIcon2');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.classList.remove('fa-eye');
                eyeIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                eyeIcon.classList.remove('fa-eye-slash');
                eyeIcon.classList.add('fa-eye');
            }
        }

        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (password !== confirmPassword) {
                alert('Passwords do not match!');
                return;
            }
            
            if (fullName && email && password) {
                // Store user data
                localStorage.setItem('userLoggedIn', 'true');
                localStorage.setItem('userEmail', email);
                localStorage.setItem('userName', fullName);
                
                alert('Account created successfully!');
                window.location.href = 'home.html';
            }
        });
    </script>
</body>
</html>
