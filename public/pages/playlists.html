<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AudioVibe - My Playlists</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .sidebar-gradient {
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
        }
        .main-gradient {
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 100%);
        }
        .card-hover:hover {
            transform: translateY(-4px);
            transition: all 0.3s ease;
        }
    </style>
</head>
<body class="bg-gray-900 text-white">
    <!-- Sidebar -->
    <div class="fixed left-0 top-0 h-full w-64 sidebar-gradient p-6 z-10">
        <div class="mb-8">
            <h1 class="text-2xl font-bold text-purple-400">AudioVibe</h1>
        </div>
        
        <nav class="space-y-4">
            <a href="home.html" class="flex items-center space-x-3 text-gray-300 hover:text-white px-4 py-2 rounded-lg hover:bg-gray-700">
                <i class="fas fa-home"></i>
                <span>Home</span>
            </a>
            <a href="my-audios.html" class="flex items-center space-x-3 text-gray-300 hover:text-white px-4 py-2 rounded-lg hover:bg-gray-700">
                <i class="fas fa-music"></i>
                <span>My Audios</span>
            </a>
            <a href="playlists.html" class="flex items-center space-x-3 text-white bg-purple-600 px-4 py-2 rounded-lg">
                <i class="fas fa-list"></i>
                <span>My Playlists</span>
            </a>
            <a href="favorites.html" class="flex items-center space-x-3 text-gray-300 hover:text-white px-4 py-2 rounded-lg hover:bg-gray-700">
                <i class="fas fa-heart"></i>
                <span>Favorites</span>
            </a>
            <a href="upload.html" class="flex items-center space-x-3 text-gray-300 hover:text-white px-4 py-2 rounded-lg hover:bg-gray-700">
                <i class="fas fa-upload"></i>
                <span>Upload Audio</span>
            </a>
        </nav>
        
        <div class="absolute bottom-6 left-6 right-6">
            <a href="profile.html" class="flex items-center space-x-3 text-gray-300 hover:text-white px-4 py-2 rounded-lg hover:bg-gray-700">
                <i class="fas fa-user"></i>
                <span>Profile</span>
            </a>
            <button onclick="logout()" class="flex items-center space-x-3 text-gray-300 hover:text-white px-4 py-2 rounded-lg hover:bg-gray-700 w-full mt-2">
                <i class="fas fa-sign-out-alt"></i>
                <span>Logout</span>
            </button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="ml-64 main-gradient min-h-screen">
        <!-- Header -->
        <header class="p-6 border-b border-gray-700">
            <div class="flex items-center justify-between">
                <h1 class="text-3xl font-bold">My Playlists</h1>
                <button onclick="createPlaylist()" class="bg-purple-600 hover:bg-purple-700 px-4 py-2 rounded-lg">
                    <i class="fas fa-plus mr-2"></i>Create Playlist
                </button>
            </div>
        </header>

        <!-- Content -->
        <main class="p-6">
            <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                <!-- Playlist Card -->
                <div class="bg-gray-800 p-6 rounded-lg card-hover cursor-pointer">
                    <div class="w-full h-40 bg-gradient-to-br from-purple-500 to-pink-500 rounded-lg mb-4 flex items-center justify-center">
                        <i class="fas fa-list text-white text-3xl"></i>
                    </div>
                    <h3 class="font-semibold text-lg mb-2">My Favorites</h3>
                    <p class="text-gray-400 text-sm mb-2">12 songs</p>
                    <p class="text-gray-500 text-xs">Created 1 week ago</p>
                </div>

                <!-- Playlist Card -->
                <div class="bg-gray-800 p-6 rounded-lg card-hover cursor-pointer">
                    <div class="w-full h-40 bg-gradient-to-br from-blue-500 to-cyan-500 rounded-lg mb-4 flex items-center justify-center">
                        <i class="fas fa-list text-white text-3xl"></i>
                    </div>
                    <h3 class="font-semibold text-lg mb-2">Chill Vibes</h3>
                    <p class="text-gray-400 text-sm mb-2">8 songs</p>
                    <p class="text-gray-500 text-xs">Created 3 days ago</p>
                </div>

                <!-- Playlist Card -->
                <div class="bg-gray-800 p-6 rounded-lg card-hover cursor-pointer">
                    <div class="w-full h-40 bg-gradient-to-br from-green-500 to-teal-500 rounded-lg mb-4 flex items-center justify-center">
                        <i class="fas fa-list text-white text-3xl"></i>
                    </div>
                    <h3 class="font-semibold text-lg mb-2">Workout Mix</h3>
                    <p class="text-gray-400 text-sm mb-2">15 songs</p>
                    <p class="text-gray-500 text-xs">Created 2 weeks ago</p>
                </div>

                <!-- Create New Playlist Card -->
                <div onclick="createPlaylist()" class="bg-gray-800 p-6 rounded-lg card-hover cursor-pointer border-2 border-dashed border-gray-600 hover:border-purple-500">
                    <div class="w-full h-40 rounded-lg mb-4 flex items-center justify-center">
                        <i class="fas fa-plus text-gray-400 text-4xl"></i>
                    </div>
                    <h3 class="font-semibold text-lg mb-2 text-center">Create New Playlist</h3>
                </div>
            </div>
        </main>
    </div>

    <!-- Create Playlist Modal -->
    <div id="createPlaylistModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-gray-800 p-6 rounded-lg w-96">
            <h2 class="text-xl font-bold mb-4">Create New Playlist</h2>
            <form id="createPlaylistForm">
                <div class="mb-4">
                    <label class="block text-white text-sm font-medium mb-2">Playlist Name</label>
                    <input type="text" id="playlistName" required 
                           class="w-full px-4 py-2 rounded-lg bg-gray-700 border border-gray-600 text-white focus:outline-none focus:ring-2 focus:ring-purple-400"
                           placeholder="Enter playlist name">
                </div>
                <div class="mb-6">
                    <label class="block text-white text-sm font-medium mb-2">Description (Optional)</label>
                    <textarea id="playlistDescription" rows="3"
                              class="w-full px-4 py-2 rounded-lg bg-gray-700 border border-gray-600 text-white focus:outline-none focus:ring-2 focus:ring-purple-400"
                              placeholder="Enter playlist description"></textarea>
                </div>
                <div class="flex justify-end space-x-4">
                    <button type="button" onclick="closeCreateModal()" class="px-4 py-2 text-gray-400 hover:text-white">
                        Cancel
                    </button>
                    <button type="submit" class="bg-purple-600 hover:bg-purple-700 px-4 py-2 rounded-lg">
                        Create Playlist
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Check if user is logged in
        if (!localStorage.getItem('userLoggedIn')) {
            window.location.href = 'index.html';
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        function createPlaylist() {
            document.getElementById('createPlaylistModal').classList.remove('hidden');
        }

        function closeCreateModal() {
            document.getElementById('createPlaylistModal').classList.add('hidden');
            document.getElementById('createPlaylistForm').reset();
        }

        document.getElementById('createPlaylistForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('playlistName').value;
            const description = document.getElementById('playlistDescription').value;
            
            if (name) {
                alert('Playlist "' + name + '" created successfully!');
                closeCreateModal();
                // Here you would typically save the playlist data
            }
        });

        // Close modal when clicking outside
        document.getElementById('createPlaylistModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeCreateModal();
            }
        });
    </script>
</body>
</html>
