openapi: 3.0.0
info:
    title: 'Audio Library API'
    description: 'A comprehensive API for managing audio files and users with Redis-based session management'
    version: 1.0.0
    contact: {name: 'API Support', email: support@audiolibrary.com}
    license: {name: MIT, url: 'https://opensource.org/licenses/MIT'}
externalDocs:
    url: 'https://github.com/adham-2002/audio-library-api'
    description: 'Find more info here'
servers:
    - {url: 'http://localhost:3000/api/v1', description: 'Development server'}
    - {url: 'https://api.audiolibrary.com/v1', description: 'Production server'}
components:
    securitySchemes: {bearerAuth: {type: http, scheme: bearer, bearerFormat: JWT, description: 'JWT Authorization header using the Bearer scheme. Example: "Authorization: Bearer {token}"'}}
tags:
    - {name: authentication}
    - {name: Sessions}
    - {name: audio}
    - {name: Admin}
    - {name: playlist}
    - {name: user}
paths:
    /auth/signin: {post: {tags: [authentication], summary: login, requestBody: {content: {application/json: {schema: {type: object, example: {email: adham@gmail.com, password: Adham@2002}}}}}, responses: {'200': {description: 'Successful response', content: {application/json: {}}}}}}
    /auth/signup: {post: {tags: [authentication], summary: register, requestBody: {content: {application/json: {schema: {type: object, example: {username: adham2002, email: adh11112am@gmail.com, password: Adham@2002, role: admin}}}}}, responses: {'200': {description: 'Successful response', content: {application/json: {}}}}}}
    /auth/refresh-token: {post: {tags: [authentication], summary: 'Refresh Token', requestBody: {content: {application/json: {schema: {type: object, example: ""}}}}, security: [{bearerAuth: []}], responses: {'200': {description: 'Successful response', content: {application/json: {}}}}}}
    /sessions/: {get: {tags: [Sessions], summary: 'Get Logged User sessions', security: [{bearerAuth: []}], responses: {'200': {description: 'Successful response', content: {application/json: {}}}}}}
    /sessions/logout: {post: {tags: [Sessions], summary: logout, requestBody: {content: {application/json: {schema: {type: object, example: {email: adham@gmail.com, password: Adham@2002}}}}}, security: [{bearerAuth: []}], responses: {'200': {description: 'Successful response', content: {application/json: {}}}}}}
    /sessions/logout-all: {post: {tags: [Sessions], summary: 'logout all', requestBody: {content: {application/json: {schema: {type: object, example: {email: adham@gmail.com, password: Adham@2002}}}}}, security: [{bearerAuth: []}], responses: {'200': {description: 'Successful response', content: {application/json: {}}}}}}
    '/sessions/{sessionId}': {delete: {tags: [Sessions], summary: 'Delete Specific session', security: [{bearerAuth: []}], parameters: [{name: sessionId, in: path, schema: {type: string}, required: true}], responses: {'200': {description: 'Successful response', content: {application/json: {}}}}}}
    /audio: {post: {tags: [audio], summary: 'create Audio', requestBody: {content: {multipart/form-data: {schema: {type: object, properties: {audio: {type: string, format: binary}, cover: {type: string, format: binary}, title: {type: string, example: 'second song but private'}, genre: {type: string, example: pop}, privacy: {type: string, example: private}}}}}}, security: [{bearerAuth: []}], responses: {'200': {description: 'Successful response', content: {application/json: {}}}}}}
    /audios/: {get: {tags: [audio], summary: 'get all Audios (Public Only)', security: [{bearerAuth: []}], responses: {'200': {description: 'Successful response', content: {application/json: {}}}}}}
    /audios/me: {get: {tags: [audio], summary: 'get my audios(private Only)', security: [{bearerAuth: []}], responses: {'200': {description: 'Successful response', content: {application/json: {}}}}}}
    /audios/687fa5ccf98532f7da9c5a32: {put: {tags: [audio], summary: 'Update Audio', requestBody: {content: {multipart/form-data: {schema: {type: object, properties: {audio: {type: string, format: binary}, cover: {type: string, format: binary}, title: {type: string, example: yessssssssssssssssssssss}, genre: {type: string, example: pop}, privacy: {type: string, example: public}}}}}}, security: [{bearerAuth: []}], responses: {'200': {description: 'Successful response', content: {application/json: {}}}}}}
    /audios/stream/6881db3455da06a7ff929193: {get: {tags: [audio], summary: 'stream audio', security: [{bearerAuth: []}], responses: {'200': {description: 'Successful response', content: {application/json: {}}}}}}
    /audio/687fa5b6f98532f7da9c5a2e: {delete: {tags: [audio], summary: 'Delete Audio FIle', security: [{bearerAuth: []}], responses: {'200': {description: 'Successful response', content: {application/json: {}}}}}}
    //audio/new-releases: {get: {tags: [audio], summary: 'get new release', security: [{bearerAuth: []}], responses: {'200': {description: 'Successful response', content: {application/json: {}}}}}}
    /audios/popular: {get: {tags: [audio], summary: 'get popular audio', security: [{bearerAuth: []}], responses: {'200': {description: 'Successful response', content: {application/json: {}}}}}}
    /admin/audios/: {get: {tags: [Admin], summary: 'get all Audios private & Public', security: [{bearerAuth: []}], responses: {'200': {description: 'Successful response', content: {application/json: {}}}}}}
    /playlists: {post: {tags: [playlist], summary: 'create playlist', requestBody: {content: {}}, security: [{bearerAuth: []}], responses: {'200': {description: 'Successful response', content: {application/json: {}}}}}, get: {tags: [playlist], summary: 'get all playlists {Public Only)', security: [{bearerAuth: []}], responses: {'200': {description: 'Successful response', content: {application/json: {}}}}}}
    /playlists/688392eb30b3efa953e6bd03: {put: {tags: [playlist], summary: 'update Playlist', requestBody: {content: {application/json: {schema: {type: object, example: {title: 'اي حاجة3'}}}}}, security: [{bearerAuth: []}], responses: {'200': {description: 'Successful response', content: {application/json: {}}}}}, patch: {tags: [playlist], summary: 'add audio to playlist', requestBody: {content: {application/json: {schema: {type: object, example: {audioId: 6881db3455da06a7ff929193}}}}}, security: [{bearerAuth: []}], responses: {'200': {description: 'Successful response', content: {application/json: {}}}}}}
    /playlists/mine: {get: {tags: [playlist], summary: 'get my playlists', security: [{bearerAuth: []}], responses: {'200': {description: 'Successful response', content: {application/json: {}}}}}}
    /playlists/688392eb30b3efa953e6bd03/audios/6881db3455da06a7ff929193: {delete: {tags: [playlist], summary: 'Delete Audio from Playlist', security: [{bearerAuth: []}], responses: {'200': {description: 'Successful response', content: {application/json: {}}}}}}
    /playlists/68823352064108d3d144d383/share: {post: {tags: [playlist], summary: 'Share Public Playlist', requestBody: {content: {multipart/form-data: {schema: {type: object, properties: {audio: {type: string, format: binary}, cover: {type: string, format: binary}, title: {type: string, example: yessssssssssssssssssssss}, genre: {type: string, example: pop}, privacy: {type: string, example: public}}}}}}, security: [{bearerAuth: []}], responses: {'200': {description: 'Successful response', content: {application/json: {}}}}}}
    /playlists/shared/f2b069091c772fe5da44f3f6ebfef2e4: {get: {tags: [playlist], summary: 'get Shared Playlist', security: [{bearerAuth: []}], responses: {'200': {description: 'Successful response', content: {application/json: {}}}}}}
    /profile: {get: {tags: [user], summary: 'get profile', security: [{bearerAuth: []}], responses: {'200': {description: 'Successful response', content: {application/json: {}}}}}}
    /add-favorite/6881db3e55da06a7ff929195: {post: {tags: [user], summary: 'add audio to favorite', requestBody: {content: {}}, security: [{bearerAuth: []}], responses: {'200': {description: 'Successful response', content: {application/json: {}}}}}}
    /favorites: {get: {tags: [user], summary: 'get favorites', security: [{bearerAuth: []}], responses: {'200': {description: 'Successful response', content: {application/json: {}}}}}}
    /remove-favorite/6881db3e55da06a7ff929195: {delete: {tags: [user], summary: 'delete from favorite', security: [{bearerAuth: []}], responses: {'200': {description: 'Successful response', content: {application/json: {}}}}}}
    /history: {get: {tags: [user], summary: 'get history', security: [{bearerAuth: []}], responses: {'200': {description: 'Successful response', content: {application/json: {}}}}}}
security:
    - {bearerAuth: []}
