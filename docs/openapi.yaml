openapi: 3.0.0
info:
    title: 'Audio Library API'
    description: 'A comprehensive API for managing audio files and users with Redis-based session management'
    version: 1.0.0
    contact: {name: 'API Support', email: support@audiolibrary.com}
    license: {name: MIT, url: 'https://opensource.org/licenses/MIT'}
externalDocs:
    url: 'https://github.com/adham-2002/audio-library-api'
    description: 'Find more info here'
servers:
    - {url: 'http://localhost:3000/api/v1', description: 'Development server'}
    - {url: 'https://api.audiolibrary.com/v1', description: 'Production server'}
components:
    securitySchemes: {bearerAuth: {type: http, scheme: bearer, bearerFormat: JWT, description: 'JWT Authorization header using the Bearer scheme. Example: "Authorization: Bearer {token}"'}}
tags:
    - {name: authentication}
    - {name: Sessions}
    - {name: audio}
    - {name: Admin}
    - {name: playlist}
    - {name: user}
paths:
    /auth/signin: {post: {tags: [authentication], summary: login, requestBody: {content: {application/json: {schema: {type: object, example: {email: adha1m@gmail.com, password: Adham@2002}}}}}, responses: {'200': {description: OK, headers: {X-Powered-By: {schema: {type: string, example: Express}}, Vary: {schema: {type: string, example: Origin}}, Access-Control-Allow-Credentials: {schema: {type: boolean, example: 'true'}}, RateLimit-Policy: {schema: {type: string, example: 5;w=900}}, RateLimit-Limit: {schema: {type: integer, example: '5'}}, RateLimit-Remaining: {schema: {type: integer, example: '4'}}, RateLimit-Reset: {schema: {type: integer, example: '900'}}, Set-Cookie: {schema: {type: string, example: 'refresh_token=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6IjY4OWY5YTQ5N2U5OGJkZGExZmU5MWQ2YyIsInJvbGUiOiJ1c2VyIiwic2Vzc2lvbklkIjoiOWIzZTAwMmEtZDJmZS00MmY2LWE1MTMtMjBjOTUwNzBmMTJiIiwiaWF0IjoxNzU1NDY3NzM3LCJleHAiOjE3NTYwNzI1Mzd9.U4Y2HeqtUn6Et4PZwH908ATk8jhNr53F1YKgJOx0GIs; Max-Age=2592000; Path=/; Expires=Tue, 16 Sep 2025 21:55:38 GMT; HttpOnly; SameSite=Strict'}}, Content-Type: {schema: {type: string, example: 'application/json; charset=utf-8'}}, Content-Length: {schema: {type: integer, example: '435'}}, ETag: {schema: {type: string, example: 'W/"1b3-vn4gBqL6q+tbT4lAB+9Kh0BY0Lw"'}}, Date: {schema: {type: string, example: 'Sun, 17 Aug 2025 21:55:38 GMT'}}, Connection: {schema: {type: string, example: keep-alive}}, Keep-Alive: {schema: {type: string, example: timeout=5}}}, content: {text/plain: {schema: {type: string}, example: "{\n    \"status\": \"success\",\n    \"message\": \"Signin successful\",\n    \"data\": {\n        \"user\": {\n            \"id\": \"689f9a497e98bdda1fe91d6c\",\n            \"name\": \"ad1ham2002\",\n            \"email\": \"adha1m@gmail.com\",\n            \"role\": \"user\"\n        },\n        \"accessToken\": \"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6IjY4OWY5YTQ5N2U5OGJkZGExZmU5MWQ2YyIsInJvbGUiOiJ1c2VyIiwic2Vzc2lvbklkIjoiOWIzZTAwMmEtZDJmZS00MmY2LWE1MTMtMjBjOTUwNzBmMTJiIiwiaWF0IjoxNzU1NDY3NzM4LCJleHAiOjE3NTU0NzEzMzh9.La_wpadfMfHUQUwRLuHxUfrYtWqR4KjlNEYA1DHc3LY\"\n    }\n}"}}}}}}
    /auth/signup: {post: {tags: [authentication], summary: register, requestBody: {content: {application/json: {schema: {type: object, example: {username: ad1ham2002, email: adha1m@gmail.com, password: Adham@2002, role: user}}}}}, responses: {'200': {description: 'Successful response', content: {application/json: {}}}}}}
    /auth/refresh-token: {post: {tags: [authentication], summary: 'Refresh Token', requestBody: {content: {application/json: {schema: {type: object, example: ""}}}}, security: [{bearerAuth: []}], responses: {'200': {description: 'Successful response', content: {application/json: {}}}}}}
    /sessions/: {get: {tags: [Sessions], summary: 'Get Logged User sessions', security: [{bearerAuth: []}], responses: {'200': {description: 'Successful response', content: {application/json: {}}}}}}
    /sessions/logout: {post: {tags: [Sessions], summary: logout, requestBody: {content: {application/json: {schema: {type: object, example: ""}}}}, security: [{bearerAuth: []}], responses: {'200': {description: 'Successful response', content: {application/json: {}}}}}}
    /sessions/logout-all: {post: {tags: [Sessions], summary: 'logout all', requestBody: {content: {application/json: {schema: {type: object, example: ""}}}}, security: [{bearerAuth: []}], responses: {'200': {description: 'Successful response', content: {application/json: {}}}}}}
    '/sessions/{sessionId}': {delete: {tags: [Sessions], summary: 'Delete Specific session', security: [{bearerAuth: []}], parameters: [{name: sessionId, in: path, schema: {type: string}, required: true, example: 8c0728e2-6592-4f65-8b41-11da9724eb7a}], responses: {'200': {description: 'Successful response', content: {application/json: {}}}}}}
    /audios/: {get: {tags: [audio], summary: 'get all Audios (Public Only)', security: [{bearerAuth: []}], parameters: [{name: searchBy, in: query, schema: {type: string}, example: '-createdAt'}], responses: {'200': {description: OK, headers: {X-Powered-By: {schema: {type: string, example: Express}}, Vary: {schema: {type: string, example: Origin}}, Access-Control-Allow-Credentials: {schema: {type: boolean, example: 'true'}}, Content-Type: {schema: {type: string, example: 'application/json; charset=utf-8'}}, Content-Length: {schema: {type: integer, example: '2568'}}, ETag: {schema: {type: string, example: 'W/"a08-MkVBPPv+ik+C2jw8UQAMQh+BZYs"'}}, Date: {schema: {type: string, example: 'Sun, 17 Aug 2025 21:55:14 GMT'}}, Connection: {schema: {type: string, example: keep-alive}}, Keep-Alive: {schema: {type: string, example: timeout=5}}}, content: {text/plain: {schema: {type: string}, example: "{\n    \"status\": \"success\",\n    \"message\": \"Public audios fetched successfully\",\n    \"results\": 6,\n    \"pagination\": {\n        \"currentPage\": 1,\n        \"limit\": 10,\n        \"numberOfPages\": 1\n    },\n    \"data\": {\n        \"audios\": [\n            {\n                \"_id\": \"68a06f688274bcde8437eadc\",\n                \"title\": \"populatrrrrrrrrrrr\",\n                \"genre\": \"pop\",\n                \"duration\": 19.2,\n                \"privacy\": \"public\",\n                \"coverName\": \"images/song_cover.jpg\",\n                \"user\": {\n                    \"_id\": \"689f9a497e98bdda1fe91d6c\",\n                    \"username\": \"ad1ham2002\",\n                    \"email\": \"adha1m@gmail.com\"\n                },\n                \"audioListeners\": [\n                    \"689f9a497e98bdda1fe91d6c\"\n                ],\n                \"listenersCount\": 1,\n                \"audioName\": \"audio_1755344744836.mp3\",\n                \"createdAt\": \"2025-08-16T11:45:44.865Z\",\n                \"updatedAt\": \"2025-08-16T11:45:58.115Z\"\n            },\n            {\n                \"_id\": \"688f7081e08c405efddd0492\",\n                \"title\": \"fk the world\",\n                \"genre\": \"pop\",\n                \"duration\": 42.06,\n                \"privacy\": \"public\",\n                \"coverName\": \"cover_1754230953119.png\",\n                \"user\": {\n                    \"_id\": \"688f6bc2f612c5cffa03150b\",\n                    \"username\": \"adham2002\",\n                    \"email\": \"adham@gmail.com\"\n                },\n                \"audioListeners\": [],\n                \"listenersCount\": 0,\n                \"audioName\": \"audio_1754230953116.mp3\",\n                \"createdAt\": \"2025-08-03T14:21:53.705Z\",\n                \"updatedAt\": \"2025-08-03T14:22:33.124Z\"\n            },\n            {\n                \"_id\": \"688f6fcde08c405efddd048b\",\n                \"title\": \"populatrrrrrrrrrrr\",\n                \"genre\": \"pop\",\n                \"duration\": 19.2,\n                \"privacy\": \"public\",\n                \"coverName\": \"cover_1754230733814.png\",\n                \"user\": {\n                    \"_id\": \"688f6bc2f612c5cffa03150b\",\n                    \"username\": \"adham2002\",\n                    \"email\": \"adham@gmail.com\"\n                },\n                \"audioListeners\": [],\n                \"listenersCount\": 0,\n                \"audioName\": \"audio_1754230733812.mp3\",\n                \"createdAt\": \"2025-08-03T14:18:53.819Z\",\n                \"updatedAt\": \"2025-08-03T14:18:53.819Z\"\n            },\n            {\n                \"_id\": \"688f6fc1e08c405efddd0489\",\n                \"title\": \"populatrrrrrrrrrrr\",\n                \"genre\": \"pop\",\n                \"duration\": 19.2,\n                \"privacy\": \"public\",\n                \"coverName\": \"cover_1754230721722.png\",\n                \"user\": {\n                    \"_id\": \"688f6bc2f612c5cffa03150b\",\n                    \"username\": \"adham2002\",\n                    \"email\": \"adham@gmail.com\"\n                },\n                \"audioListeners\": [],\n                \"listenersCount\": 0,\n                \"audioName\": \"audio_1754230721721.mp3\",\n                \"createdAt\": \"2025-08-03T14:18:41.727Z\",\n                \"updatedAt\": \"2025-08-03T14:18:41.727Z\"\n            },\n            {\n                \"_id\": \"688f6d91e08c405efddd047f\",\n                \"title\": \"fk the world\",\n                \"genre\": \"pop\",\n                \"duration\": 19.2,\n                \"privacy\": \"public\",\n                \"coverName\": \"cover_1754230798110.png\",\n                \"user\": {\n                    \"_id\": \"688f6bc2f612c5cffa03150b\",\n                    \"username\": \"adham2002\",\n                    \"email\": \"adham@gmail.com\"\n                },\n                \"audioListeners\": [],\n                \"listenersCount\": 0,\n                \"audioName\": \"audio_1754230798108.mp3\",\n                \"createdAt\": \"2025-08-03T14:09:21.507Z\",\n                \"updatedAt\": \"2025-08-03T14:19:58.115Z\"\n            },\n            {\n                \"_id\": \"688f6bf1f612c5cffa031513\",\n                \"title\": \"new\",\n                \"genre\": \"pop\",\n                \"duration\": 42.06,\n                \"privacy\": \"public\",\n                \"coverName\": \"cover_1754230096020.png\",\n                \"user\": {\n                    \"_id\": \"688f6bc2f612c5cffa03150b\",\n                    \"username\": \"adham2002\",\n                    \"email\": \"adham@gmail.com\"\n                },\n                \"audioListeners\": [\n                    \"688f6bc2f612c5cffa03150b\"\n                ],\n                \"listenersCount\": 1,\n                \"audioName\": \"audio_1754230096013.mp3\",\n                \"createdAt\": \"2025-08-03T14:02:25.154Z\",\n                \"updatedAt\": \"2025-08-03T14:08:16.044Z\"\n            }\n        ]\n    }\n}"}}}}}}
    /audios/me: {get: {tags: [audio], summary: 'get my audios(private Only)', security: [{bearerAuth: []}], responses: {'200': {description: 'Successful response', content: {application/json: {}}}}}}
    '/audios/stream/{audioId}': {get: {tags: [audio], summary: 'stream audio', security: [{bearerAuth: []}], parameters: [{name: audioId, in: path, schema: {type: string}, required: true, example: 688f6bf1f612c5cffa031513}], responses: {'200': {description: 'Successful response', content: {application/json: {}}}}}}
    '/audios/{audioId}': {get: {tags: [audio], summary: 'Get Specific audio', security: [{bearerAuth: []}], parameters: [{name: audioId, in: path, schema: {type: string}, required: true, example: 688f4ec1c5999768205864d6}], responses: {'200': {description: 'Successful response', content: {application/json: {}}}}}, put: {tags: [audio], summary: 'Update Audio', requestBody: {content: {multipart/form-data: {schema: {type: object, properties: {audio: {type: string, format: binary}, cover: {type: string, format: binary}, title: {type: string, example: 'fk the world '}, genre: {type: string, example: pop}, privacy: {type: string, example: public}}}}}}, security: [{bearerAuth: []}], parameters: [{name: audioId, in: path, schema: {type: string}, required: true, example: 688f7081e08c405efddd0492}], responses: {'200': {description: 'Successful response', content: {application/json: {}}}}}}
    /audio: {post: {tags: [audio], summary: 'create Audio', requestBody: {content: {multipart/form-data: {schema: {type: object, properties: {audio: {type: string, format: binary}, cover: {type: string, format: binary}, title: {type: string, example: populatrrrrrrrrrrr}, genre: {type: string, example: pop}, privacy: {type: string, example: public}}}}}}, security: [{bearerAuth: []}], responses: {'200': {description: 'Successful response', content: {application/json: {}}}}}}
    /audio/688f65e3c72e99825f7e2404: {delete: {tags: [audio], summary: 'Delete Audio FIle', security: [{bearerAuth: []}], responses: {'200': {description: 'Successful response', content: {application/json: {}}}}}}
    //audio/new-releases: {get: {tags: [audio], summary: 'get new release', security: [{bearerAuth: []}], responses: {'200': {description: 'Successful response', content: {application/json: {}}}}}}
    /audios/popular: {get: {tags: [audio], summary: 'get popular audio', security: [{bearerAuth: []}], responses: {'200': {description: 'Successful response', content: {application/json: {}}}}}}
    /admin/audios/: {get: {tags: [Admin], summary: 'get all Audios private & Public', security: [{bearerAuth: []}], responses: {'200': {description: 'Successful response', content: {application/json: {}}}}}}
    /playlists: {get: {tags: [playlist], summary: 'get all playlists {Public Only)', security: [{bearerAuth: []}], responses: {'200': {description: 'Successful response', content: {application/json: {}}}}}, post: {tags: [playlist], summary: 'create playlist', requestBody: {content: {application/json: {schema: {type: object, example: {title: 'love songs', privacy: public}}}}}, security: [{bearerAuth: []}], responses: {'200': {description: 'Successful response', content: {application/json: {}}}}}}
    /playlists/688392eb30b3efa953e6bd03: {put: {tags: [playlist], summary: 'update Playlist', requestBody: {content: {application/json: {schema: {type: object, example: {title: 'اي حاجة3'}}}}}, security: [{bearerAuth: []}], responses: {'200': {description: 'Successful response', content: {application/json: {}}}}}, patch: {tags: [playlist], summary: 'add audio to playlist', requestBody: {content: {application/json: {schema: {type: object, example: {audioId: 6881db3455da06a7ff929193}}}}}, security: [{bearerAuth: []}], responses: {'200': {description: 'Successful response', content: {application/json: {}}}}}}
    /playlists/mine: {get: {tags: [playlist], summary: 'get my playlists', security: [{bearerAuth: []}], responses: {'200': {description: 'Successful response', content: {application/json: {}}}}}}
    /playlists/688392eb30b3efa953e6bd03/audios/6881db3455da06a7ff929193: {delete: {tags: [playlist], summary: 'Delete Audio from Playlist', security: [{bearerAuth: []}], responses: {'200': {description: 'Successful response', content: {application/json: {}}}}}}
    /playlists/68823352064108d3d144d383/share: {post: {tags: [playlist], summary: 'Share Public Playlist', requestBody: {content: {multipart/form-data: {schema: {type: object, properties: {audio: {type: string, format: binary}, cover: {type: string, format: binary}, title: {type: string, example: yessssssssssssssssssssss}, genre: {type: string, example: pop}, privacy: {type: string, example: public}}}}}}, security: [{bearerAuth: []}], responses: {'200': {description: 'Successful response', content: {application/json: {}}}}}}
    /playlists/shared/f2b069091c772fe5da44f3f6ebfef2e4: {get: {tags: [playlist], summary: 'get Shared Playlist', security: [{bearerAuth: []}], responses: {'200': {description: 'Successful response', content: {application/json: {}}}}}}
    /users: {get: {tags: [user], summary: 'Get List of Users', security: [{bearerAuth: []}], responses: {'200': {description: 'Successful response', content: {application/json: {}}}}}}
    /users/689f9a497e98bdda1fe91d6c: {put: {tags: [user], summary: 'Deactivate User account', requestBody: {content: {}}, security: [{bearerAuth: []}], responses: {'200': {description: 'Successful response', content: {application/json: {}}}}}}
    /profile: {get: {tags: [user], summary: 'get profile', security: [{bearerAuth: []}], responses: {'200': {description: 'Successful response', content: {application/json: {}}}}}}
    /add-favorite/6881db3e55da06a7ff929195: {post: {tags: [user], summary: 'add audio to favorite', requestBody: {content: {}}, security: [{bearerAuth: []}], responses: {'200': {description: 'Successful response', content: {application/json: {}}}}}}
    /favorites: {get: {tags: [user], summary: 'get favorites', security: [{bearerAuth: []}], responses: {'200': {description: 'Successful response', content: {application/json: {}}}}}}
    /remove-favorite/6881db3e55da06a7ff929195: {delete: {tags: [user], summary: 'delete from favorite', security: [{bearerAuth: []}], responses: {'200': {description: 'Successful response', content: {application/json: {}}}}}}
    /history: {get: {tags: [user], summary: 'get history', security: [{bearerAuth: []}], responses: {'200': {description: 'Successful response', content: {application/json: {}}}}}}
security:
    - {bearerAuth: []}
